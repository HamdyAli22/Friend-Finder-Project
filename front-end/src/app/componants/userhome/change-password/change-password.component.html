<!-- ========== OUTSIDE (Forgot Password) ========== -->
<section
  *ngIf="mode === 'forgot'"
  id="banner"
  class="d-flex align-items-center justify-content-center"
  style="min-height: 100vh;"
>
  <div class="container">
    <div class="sign-up-form text-center">

      <!-- Logo -->
      <a href="/" class="logo mb-4 d-block">
        <img src="assets/images/logo.png" alt="Friend Finder" style="max-width: 180px;" />
      </a>

      <!-- Card -->
      <div class="card shadow-lg border-0 mx-auto" style="max-width: 480px;">
        <div class="card-body p-4">

          <!-- 🔽 نفس الفورم -->
          <ng-container *ngTemplateOutlet="changePasswordForm"></ng-container>

        </div>
      </div>

      <img class="form-shadow mt-4" src="assets/images/bottom-shadow.png" alt="" />
    </div>
  </div>
</section>

<!-- ========== INSIDE (Logged In) ========== -->
<div *ngIf="mode !== 'forgot'" id="page-contents">
  <div class="container">
    <div class="row">

      <app-left-bar></app-left-bar>

      <div class="col-md-7">
        <div class="change-pass-container">
          <div class="change-pass-card">

            <!-- 🔽 نفس الفورم -->
            <ng-container *ngTemplateOutlet="changePasswordForm"></ng-container>

          </div>
        </div>
      </div>

      <app-right-bar></app-right-bar>

    </div>
  </div>
</div>

<!-- ========== FORM TEMPLATE (FINAL) ========== -->
<ng-template #changePasswordForm>

  <!-- العنوان في النص -->
  <h2 class="text-center">
    {{ mode === 'forgot' ? 'Reset Password' : 'Change Password' }}
  </h2>

  <!-- Messages -->
  <div *ngIf="messageEn || messageAr" class="alert alert-info custom-alert mb-3">
    <button type="button" class="custom-x" (click)="clearMessage()">&times;</button>
    <div>
      <strong *ngIf="messageEn">{{ messageEn }}</strong><br>
      <span *ngIf="messageAr">{{ messageAr }}</span>
    </div>
  </div>

  <!-- 👇 ده الحل الأساسي -->
  <div class="field-wrapper">

    <form (ngSubmit)="onSubmit()">

      <!-- Old Password -->
      <div class="form-group" *ngIf="mode === 'main'">
        <label>Old Password</label>
        <div class="input-container">
          <input
            [type]="showOldPassword ? 'text' : 'password'"
            [(ngModel)]="form.oldPassword"
            name="oldPassword"
            placeholder="Enter your old password"
            class="form-control">
          <i
            class="fa field-icon clickable"
            [ngClass]="showOldPassword ? 'fa-eye-slash' : 'fa-eye'"
            (click)="togglePasswordVisibility('old')">
          </i>
        </div>
      </div>

      <!-- Email -->
      <div class="form-group" *ngIf="mode === 'forgot'">
        <label>Email</label>
        <input
          type="email"
          [(ngModel)]="form.email"
          name="email"
          placeholder="Enter your Email"
          class="form-control">
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label>New Password</label>
        <div class="input-container">
          <input
            [type]="showNewPassword ? 'text' : 'password'"
            [(ngModel)]="form.newPassword"
            name="newPassword"
            placeholder="Enter your new password"
            class="form-control">
          <i
            class="fa field-icon clickable"
            [ngClass]="showNewPassword ? 'fa-eye-slash' : 'fa-eye'"
            (click)="togglePasswordVisibility('new')">
          </i>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label>Confirm Password</label>
        <div class="input-container">
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="form.confirmPassword"
            name="confirmPassword"
            placeholder="Re-enter your password"
            class="form-control">
          <i
            class="fa field-icon clickable"
            [ngClass]="showConfirmPassword ? 'fa-eye-slash' : 'fa-eye'"
            (click)="togglePasswordVisibility('confirm')">
          </i>
        </div>
      </div>

      <button type="submit" [disabled]="isLoading">
        {{ isLoading ? 'Processing...' : 'Change Password' }}
      </button>

      <div class="forgot-footer" *ngIf="mode === 'forgot'">
        Remember your password?
        <a routerLink="/login" class="text-primary">Login</a>
      </div>



    </form>
  </div>
</ng-template>
